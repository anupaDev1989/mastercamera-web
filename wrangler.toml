# Cloudflare Pages Configuration for Kitly Landing Page

name = "kitly-webpage"
compatibility_date = "2024-12-04"

# KV Namespace for Rate Limiting
# To create: wrangler kv:namespace create RATE_LIMIT
# Then add the ID below after creation
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "YOUR_KV_NAMESPACE_ID_HERE"  # Replace with your actual KV namespace ID

# D1 Database binding (if not already configured)
[[d1_databases]]
binding = "DB"
database_name = "kitly-leads"
database_id = "YOUR_DATABASE_ID_HERE"  # Replace with your actual D1 database ID

# Build configuration (handled by Cloudflare Pages UI, but documented here)
# Build command: npm run build
# Build output directory: dist
# Root directory: /
